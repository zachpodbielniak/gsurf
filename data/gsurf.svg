<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- gsurf application icon: a stylized wave ("surf") inside a browser globe -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e66f5"/>
      <stop offset="1" stop-color="#7287fd"/>
    </linearGradient>
  </defs>
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>
  <circle cx="64" cy="64" r="60" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2"/>
  <!-- meridians/parallels to read as a globe -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="3">
    <ellipse cx="64" cy="64" rx="28" ry="60"/>
    <line x1="4" y1="64" x2="124" y2="64"/>
  </g>
  <!-- the surf wave -->
  <path d="M16 84 C 36 60, 52 60, 64 76 C 76 92, 96 92, 112 68"
        fill="none" stroke="#ffffff" stroke-width="9"
        stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="112" cy="68" r="7" fill="#ffffff"/>
</svg>
